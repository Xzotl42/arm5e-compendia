name: Validate Build

# This workflow runs on every push and pull request to catch broken builds
# before a release is cut.
#
# TO DISABLE QUICKLY: Change the 'on' section below to:
#
#   on: workflow_dispatch
#
# That makes it manual-only. Re-enable by restoring the push/pull_request triggers.

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate module.json
        run: python3 -m json.tool module.json > /dev/null

      - name: Install module
        run: npm install

      - name: Fix links
        run: npm run prepare:commit

      - name: Create Database Packs
        run: npm run pack
